<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RazerCord P2P</title>
    <!-- Подключаем библиотеку прямой связи PeerJS, которая работает без блокировок в РФ -->
    <script src="https://unpkg.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { display: flex; height: 100vh; background-color: #313338; color: #dbdee1; overflow: hidden; }
        .sidebar { width: 240px; background-color: #2b2d31; display: flex; flex-direction: column; padding: 10px; gap: 5px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: #313338; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .input-container { padding: 20px; }
        .chat-input { width: 100%; padding: 15px; background-color: #383a40; border: none; border-radius: 8px; color: #fff; outline: none; }
        .members-bar { width: 200px; background-color: #2b2d31; padding: 10px; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #1e1f22; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background-color: #313338; padding: 30px; border-radius: 8px; text-align: center; width: 400px; }
        .login-input { width: 100%; padding: 10px; background-color: #1e1f22; border: 1px solid #111; border-radius: 4px; color: #fff; margin-bottom: 10px; }
        .login-btn { width: 100%; padding: 10px; background-color: #5865f2; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#fff; margin-bottom:15px;">Создать или Войти</h2>
            <input type="text" class="login-input" id="nicknameInput" placeholder="Твой никнейм">
            
            <div style="border-top: 1px solid #404249; margin: 15px 0; padding-top: 15px;">
                <p style="color:#b5bac1; font-size:13px; margin-bottom:8px;">Если ты Админ (создаешь сервер):</p>
                <button class="login-btn" onclick="startAsHost()">1. Создать сервер</button>
            </div>

            <div style="border-top: 1px solid #404249; margin: 15px 0; padding-top: 15px;">
                <p style="color:#b5bac1; font-size:13px; margin-bottom:8px;">Если подключаешься к другу:</p>
                <input type="text" class="login-input" id="hostIdInput" placeholder="Введи секретный ID друга">
                <button class="login-btn" style="background-color: #23a55a;" onclick="connectToHost()">2. Подключиться к другу</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <h3 style="color:#fff; margin-bottom:10px;">🎮 RazerCord</h3>
        <div style="background:#404249; padding:8px; border-radius:4px; color:#fff;" id="roomCodeBlock">ID: Создание...</div>
    </div>

    <div class="chat-area">
        <div style="padding:15px; border-bottom:1px solid #1f2023; font-weight:bold; color:#fff;"># общий</div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Написать в #общий..." onkeypress="handleKeyPress(event)">
        </div>
    </div>

    <div class="members-bar">
        <h4 style="font-size:12px; color:#949ba4; margin-bottom:10px;">В СЕТИ</h4>
        <div id="usersList"></div>
    </div>

    <script>
        let currentUser = "";
        let peer = null;
        let connections = []; // Для админа: храним всех зашедших друзей
        let connToHost = null; // Для друга: связь с админом
        let allMessages = [{ author: "Система", text: "Добро пожаловать в RazerCord P2P!" }];
        let activeUsers = new Set(["Система"]);

        function initUI() {
            document.getElementById('loginOverlay').style.display = 'none';
            activeUsers.add(currentUser);
            renderUsers();
            renderMessages();
        }

        // 1. ЛОГИКА ДЛЯ АДМИНА (Создание комнаты)
        function startAsHost() {
            currentUser = document.getElementById('nicknameInput').value.trim();
            if (!currentUser) return alert("Введи ник!");

            // Генерируем случайный красивый ID комнаты
            const roomId = 'razer-' + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(roomId);

            peer.on('open', (id) => {
                document.getElementById('roomCodeBlock').innerText = "ID сервера: " + id;
                initUI();
            });

            // Ждем подключений от друзей
            peer.on('connection', (conn) => {
                connections.push(conn);
                
                conn.on('data', (data) => {
                    if (data.type === 'login') {
                        activeUsers.add(data.user);
                        renderUsers();
                        // Рассылаем обновленный список пользователей всем
                        broadcast({ type: 'sys_users', users: Array.from(activeUsers) });
                        // Отправляем новому другу историю сообщений
                        conn.send({ type: 'history', messages: allMessages });
                    } else if (data.type === 'msg') {
                        allMessages.push(data.msg);
                        renderMessages();
                        broadcast({ type: 'msg', msg: data.msg });
                    }
                });
            });
        }

        // 2. ЛОГИКА ДЛЯ ДРУГА (Подключение)
        function connectToHost() {
            currentUser = document.getElementById('nicknameInput').value.trim();
            const hostId = document.getElementById('hostIdInput').value.trim();
            if (!currentUser || !hostId) return alert("Заполни ник и ID друга!");

            peer = new Peer();

            peer.on('open', () => {
                connToHost = peer.connect(hostId);
                document.getElementById('roomCodeBlock').innerText = "Подключен к: " + hostId;
                initUI();

                connToHost.on('open', () => {
                    // Отправляем админу свой никнейм
                    connToHost.send({ type: 'login', user: currentUser });
                });

                connToHost.on('data', (data) => {
                    if (data.type === 'msg') {
                        allMessages.push(data.msg);
                        renderMessages();
                    } else if (data.type === 'sys_users') {
                        activeUsers = new Set(data.users);
                        renderUsers();
                    } else if (data.type === 'history') {
                        allMessages = data.messages;
                        renderMessages();
                    }
                });
            });
        }

        // Функция админа для рассылки данных всем подключенным друзьям
        function broadcast(data) {
            connections.forEach(conn => {
                if (conn.open) conn.send(data);
            });
        }

        function renderUsers() {
            const container = document.getElementById('usersList');
            if (!container) return;
            container.innerHTML = "";
            activeUsers.forEach(user => {
                container.innerHTML += `<div style="padding:5px 0; color:#fff;">🟢 ${user}</div>`;
            });
        }

        function renderMessages() {
            const box = document.getElementById('messagesContainer');
            if (!box) return;
            box.innerHTML = "";
            allMessages.forEach(m => {
                box.innerHTML += `<div style="margin-bottom:5px;"><strong style="color:#5865f2">${m.author}:</strong> <span style="color:#dbdee1">${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if (!text) return;

                const msgObj = { author: currentUser, text: text };
                allMessages.push(msgObj);
                renderMessages();

                if (connToHost) {
                    // Если мы друг — отправляем админу
                    connToHost.send({ type: 'msg', msg: msgObj });
                } else {
                    // Если мы админ — рассылаем всем друзьям
                    broadcast({ type: 'msg', msg: msgObj });
                }
                input.value = "";
            }
        }
    </script>
</body>
</html>
