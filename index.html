<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RazerCord Локальный</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { display:flex; height:100vh; background:#313338; color:#dbdee1; overflow:hidden; }
        .sidebar { width:240px; background:#2b2d31; display:flex; flex-direction:column; padding:10px; gap:5px; }
        .chat-area { flex:1; display:flex; flex-direction:column; background:#313338; }
        .messages-container { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
        .input-container { padding:20px; }
        .chat-input { width:100%; padding:15px; background:#383a40; border:none; border-radius:8px; color:#fff; outline:none; }
        .members-bar { width:200px; background:#2b2d31; padding:10px; }
        .login-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:#1e1f22; display:flex; align-items:center; justify-content:center; z-index:100; }
        .login-box { background:#313338; padding:30px; border-radius:8px; text-align:center; }
        .login-input { width:100%; padding:10px; background:#1e1f22; border:1px solid #111; border-radius:4px; color:#fff; margin-bottom:15px; }
        .login-btn { width:100%; padding:10px; background:#5865f2; border:none; border-radius:4px; color:#fff; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#fff; margin-bottom:15px;">С возвращением!</h2>
            <input type="text" class="login-input" id="nicknameInput" placeholder="Введите ваш никнейм">
            <button class="login-btn" onclick="login()">Войти в чат</button>
        </div>
    </div>
    <div class="sidebar">
        <h3 style="color:#fff; margin-bottom:10px;">🎮 RazerCord</h3>
        <div style="background:#404249; padding:8px; border-radius:4px; color:#fff;"># общий</div>
    </div>
    <div class="chat-area">
        <div style="padding:15px; border-bottom:1px solid #1f2023; font-weight:bold; color:#fff;"># общий</div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Написать в #общий...">
        </div>
    </div>
    <div class="members-bar">
        <h4 style="font-size:12px; color:#949ba4; margin-bottom:10px;">В СЕТИ</h4>
        <div id="usersList"></div>
    </div>

    <script>
        let currentUser = "";
        let allMessages = [];
        let activeUsers = new Set();

        // Загрузка из памяти твоего браузера
        function loadLocalMessages() {
            const saved = localStorage.getItem('razercord_messages');
            if (saved) {
                allMessages = JSON.parse(saved);
            } else {
                allMessages = [{ author: "Система", text: "Добро пожаловать в RazerCord! Напишите первое сообщение." }];
            }
            
            activeUsers.clear();
            allMessages.forEach(m => { if(m.author) activeUsers.add(m.author); });
            if(currentUser) activeUsers.add(currentUser);
            
            renderUsers();
            renderMessages();
        }

        // Сохранение в память браузера
        function saveMessageLocal(text) {
            allMessages.push({ author: currentUser, text: text });
            localStorage.setItem('razercord_messages', JSON.stringify(allMessages));
            loadLocalMessages();
        }

        function login() {
            const nick = document.getElementById('nicknameInput').value.trim();
            if (!nick) return alert("Введите ник!");
            currentUser = nick;
            document.getElementById('loginOverlay').style.display = 'none';
            loadLocalMessages();
        }

        function renderUsers() {
            const container = document.getElementById('usersList');
            if (!container) return;
            container.innerHTML = "";
            activeUsers.forEach(user => {
                container.innerHTML += `<div style="padding:5px 0; color:#fff;">🟢 ${user}</div>`;
            });
        }

        function renderMessages() {
            const box = document.getElementById('messagesContainer');
            if (!box) return;
            box.innerHTML = "";
            allMessages.forEach(m => {
                box.innerHTML += `<div style="margin-bottom:5px;"><strong style="color:#5865f2">${m.author}</strong> <span style="color:#dbdee1">${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

        // Ловим нажатие Enter в поле ввода
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('chatInput');
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const text = input.value.trim();
                        if (!text) return;
                        saveMessageLocal(text);
                        input.value = "";
                    }
                });
            }
        });
    </script>
</body>
</html>
