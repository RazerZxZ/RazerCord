<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RazerCord Global</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { display:flex; height:100vh; background:#313338; color:#dbdee1; overflow:hidden; }
        .sidebar { width:240px; background:#2b2d31; display:flex; flex-direction:column; padding:10px; gap:5px; }
        .chat-area { flex:1; display:flex; flex-direction:column; background:#313338; }
        .messages-container { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
        .input-container { padding:20px; }
        .chat-input { width:100%; padding:15px; background:#383a40; border:none; border-radius:8px; color:#fff; outline:none; }
        .members-bar { width:200px; background:#2b2d31; padding:10px; }
        .login-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:#1e1f22; display:flex; align-items:center; justify-content:center; z-index:100; }
        .login-box { background:#313338; padding:30px; border-radius:8px; text-align:center; }
        .login-input { width:100%; padding:10px; background:#1e1f22; border:1px solid #111; border-radius:4px; color:#fff; margin-bottom:15px; }
        .login-btn { width:100%; padding:10px; background:#5865f2; border:none; border-radius:4px; color:#fff; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#fff; margin-bottom:15px;">С возвращением!</h2>
            <input type="text" class="login-input" id="nicknameInput" placeholder="Введите ваш никнейм">
            <button class="login-btn" onclick="login()">Войти в чат</button>
        </div>
    </div>
    <div class="sidebar">
        <h3 style="color:#fff; margin-bottom:10px;">🎮 RazerCord</h3>
        <div style="background:#404249; padding:8px; border-radius:4px; color:#fff;"># общий</div>
    </div>
    <div class="chat-area">
        <div style="padding:15px; border-bottom:1px solid #1f2023; font-weight:bold; color:#fff;"># общий</div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Написать в #общий..." onkeypress="handleKeyPress(event)">
        </div>
    </div>
    <div class="members-bar">
        <h4 style="font-size:12px; color:#949ba4; margin-bottom:10px;">В СЕТИ</h4>
        <div id="usersList"></div>
    </div>

    <script>
        let currentUser = "";
        let allMessages = [{ author: "Система", text: "Добро пожаловать в глобальный RazerCord!" }];
        let activeUsers = new Set(["Система"]);
        let ws;

        function connect() {
            // Подключаемся к бесплатному публичному тестовому серверу, который открыт для всех
            ws = new WebSocket("wss://piesocket.com");

            ws.onopen = () => {
                // Маякуем всем, что мы онлайн
                send({ type: "online", user: currentUser });
            };

            ws.onmessage = (event) => {
                try {
                    // Сервер возвращает нам наши же сообщения, парсим их
                    const data = JSON.parse(event.data);
                    if (data.type === "msg") {
                        allMessages.push(data.payload);
                        renderMessages();
                    } else if (data.type === "online") {
                        if (data.user) activeUsers.add(data.user);
                        renderUsers();
                    }
                } catch (e) {}
            };

            ws.onclose = () => { setTimeout(connect, 2000); };
        }

        function send(obj) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(obj));
            }
        }

        function login() {
            const nick = document.getElementById('nicknameInput').value.trim();
            if (!nick) return alert("Введите ник!");
            currentUser = nick;
            activeUsers.add(currentUser);
            document.getElementById('loginOverlay').style.display = 'none';
            
            renderUsers();
            renderMessages();
            connect();

            // Каждые 3 секунды обновляем статус сети
            setInterval(() => { send({ type: "online", user: currentUser }); }, 3000);
        }

        function renderUsers() {
            const container = document.getElementById('usersList');
            if (!container) return;
            container.innerHTML = "";
            activeUsers.forEach(user => {
                container.innerHTML += `<div style="padding:5px 0; color:#fff;">🟢 ${user}</div>`;
            });
        }

        function renderMessages() {
            const box = document.getElementById('messagesContainer');
            if (!box) return;
            box.innerHTML = "";
            allMessages.forEach(m => {
                box.innerHTML += `<div style="margin-bottom:5px;"><strong style="color:#5865f2">${m.author}:</strong> <span style="color:#dbdee1">${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('chatInput');
                if (!input) return;
                const text = input.value.trim();
                if (!text) return;
                
                const msgObj = { author: currentUser, text: text };
                
                // Отображаем у себя локально сразу
                allMessages.push(msgObj);
                renderMessages();
                
                // Пускаем в сеть
                send({ type: "msg", payload: msgObj });
                input.value = "";
            }
        }
    </script>
</body>
</html>
